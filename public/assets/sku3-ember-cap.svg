<?xml version="1.0" encoding="UTF-8"?>
<!--
  STITCH AND ASH — SKU-3 "Ember" (cap-front hit, ~2.25"x2.25" sewout on 6-panel structured cap)
  Production-ready vector. Outlined paths only.
  Minimal design: small broken circle + ember-red diagonal needle. NO wordmark, NO ash speckle.
  Reads as a coin/pin at cap-front scale. Lowest stitch count of the three SKUs.
  Coordinate system: 1 user-unit = 1mm. Sewout footprint ~57mm x 57mm = ~2.25".
  Stitch-budget target: cap-front ~4,500 stitch cap (Printful cap embroidery is tighter).
  Estimate: ~2,800 stitches. Plenty of headroom for digitizer pull-comp.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64" width="57mm" height="57mm" preserveAspectRatio="xMidYMid meet">
  <metadata>
    <design xmlns="urn:stitchandash:design">
      <sku>SAA-PILOT-03</sku>
      <name>Ember</name>
      <placement>cap front, centered</placement>
      <unit>mm</unit>
      <target-stitches>2800</target-stitches>
      <max-stitches>4500</max-stitches>
      <colors>2</colors>
      <thread name="bone-white" hex="#E6E6E6" madeira="1001" isacord="0010"/>
      <thread name="ember-red" hex="#B8332A" madeira="1147" isacord="1903"/>
    </design>
  </metadata>

  <!-- Layer 1: broken circle r=22mm in 12 arc segments, running stitch -->
  <g id="broken-circle" fill="none" stroke="#E6E6E6" stroke-width="1.2" stroke-linecap="butt">
    <path d="M 22.000 0.000 A 22 22 0 0 1 20.065 9.018"/>
    <path d="M 17.622 13.153 A 22 22 0 0 1 11.000 19.053"/>
    <path d="M 6.797 20.308 A 22 22 0 0 1 -1.151 21.970"/>
    <path d="M -5.732 21.240 A 22 22 0 0 1 -12.945 17.788"/>
    <path d="M -16.200 14.599 A 22 22 0 0 1 -20.065 9.018"/>
    <path d="M -21.398 4.583 A 22 22 0 0 1 -21.398 -4.583"/>
    <path d="M -20.065 -9.018 A 22 22 0 0 1 -16.200 -14.599"/>
    <path d="M -12.945 -17.788 A 22 22 0 0 1 -5.732 -21.240"/>
    <path d="M -1.151 -21.970 A 22 22 0 0 1 6.797 -20.308"/>
    <path d="M 11.000 -19.053 A 22 22 0 0 1 17.622 -13.153"/>
    <path d="M 20.065 -9.018 A 22 22 0 0 1 22.000 0.000"/>
  </g>

  <!-- Layer 2: ember-red diagonal needle (tapered satin column) -->
  <g id="needle" fill="#B8332A" stroke="none">
    <path d="M -29.40 -30.20 L -28.60 -31.00 L 30.00 28.20 L 29.40 28.80 Z"/>
  </g>

  <!-- Layer 3: needle eye (small open ring) -->
  <g id="needle-eye" fill="none" stroke="#B8332A" stroke-width="0.7">
    <circle cx="-29.0" cy="-29.0" r="1.6"/>
  </g>

  <!-- Layer 4: short thread tail (omitted for cap scale — too small to register cleanly) -->
</svg>
