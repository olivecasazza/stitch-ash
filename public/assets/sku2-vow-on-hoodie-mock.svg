          <circle cx="-56" cy="-56" r="2.9" fill="none" stroke="#B8332A" stroke-width="1.0"/>
        </g>
        <g fill="#7A7468">
          <circle cx="-14" cy="17" r="1.2"/><circle cx="12" cy="-8" r="1.2"/>
          <circle cx="20" cy="22" r="1.2"/><circle cx="-27" cy="-15" r="1.2"/>
          <circle cx="28" cy="-28" r="1.2"/><circle cx="-8" cy="32" r="1.2"/>
        </g>
      </g>
      <!-- wordmark below -->
      <g text-anchor="middle">
