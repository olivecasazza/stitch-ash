        <text y="115" fill="#E6E6E6" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="38" letter-spacing="6">AND ASH</text>
        <line x1="-70" y1="138" x2="70" y2="138" stroke="#7A7468" stroke-width="0.7"/>
