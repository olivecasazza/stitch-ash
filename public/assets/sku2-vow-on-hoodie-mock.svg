<?xml version="1.0" encoding="UTF-8"?>
<!-- STITCH AND ASH — SKU-2 'Vow' on Independent Trading SS4500 heavyweight hoodie (charcoal pitch).
     Thumbnail / placement spec preview only. Not for production. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <rect width="600" height="700" fill="#1A1A1A"/>
  <text x="300" y="30" text-anchor="middle" fill="#7A7468" font-family="Impact, sans-serif" font-size="14" letter-spacing="4">SKU-2 · VOW · FULL BACK · INDEPENDENT SS4500 HOODIE (CHARCOAL PITCH)</text>

  <!-- hoodie back silhouette -->
  <g transform="translate(80,55)">
