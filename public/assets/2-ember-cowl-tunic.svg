<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" height="100%">
  <defs>
    <linearGradient id="tunic-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="#18181b"/>

  <!-- Tunic Silhouette -->
  <g filter="url(#shadow)">
    <!-- Asymmetric Cowl Neck -->
    <path d="M 300 200 Q 400 350 550 220 Q 520 300 480 320 Q 400 300 320 350 Z" fill="#151515"/>
    
    <!-- Draped Body -->
    <path d="M 320 350 Q 400 320 480 320 L 580 850 Q 400 1000 220 800 Z" fill="url(#tunic-grad)"/>
    
    <!-- Elongated Sleeves with thumbholes -->
    <path d="M 320 350 L 120 750 L 150 820 L 250 500 Z" fill="url(#tunic-grad)"/>
    <path d="M 480 320 L 680 700 L 650 780 L 550 480 Z" fill="url(#tunic-grad)"/>
  </g>

  <!-- Embroidery: Ember Broken Circle -->
  <!-- Placed low on the left draped edge -->
  <g transform="translate(300, 750) rotate(-15)">
    <!-- Inner ember glow illusion using dense stitching -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#e04e22" stroke-width="2" stroke-dasharray="1, 4" opacity="0.6"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#b22b10" stroke-width="4" stroke-dasharray="2, 6, 8, 4"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#8a1a0b" stroke-width="6" stroke-dasharray="15, 30, 45, 10" stroke-linecap="round"/>
    
    <!-- Central fragmented ampersand -->
    <path d="M -15 -20 Q 10 -40 20 -10 Q 30 20 -15 30" fill="none" stroke="#e04e22" stroke-width="3" stroke-linecap="round"/>
    <path d="M 15 30 L -25 -25" fill="none" stroke="#e04e22" stroke-width="3" stroke-dasharray="4, 4" stroke-linecap="round"/>
  </g>

  <!-- Product Tag -->
  <g transform="translate(40, 40)">
    <rect width="200" height="80" rx="8" fill="white" opacity="0.9"/>
    <text x="20" y="35" font-family="monospace" font-size="14" font-weight="bold" fill="#000">KILN DRAPE TUNIC</text>
    <text x="20" y="55" font-family="monospace" font-size="12" fill="#666">EMBER THREAD ON ASH</text>
  </g>
</svg>
