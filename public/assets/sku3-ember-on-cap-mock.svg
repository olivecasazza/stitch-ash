<?xml version="1.0" encoding="UTF-8"?>
<!-- STITCH AND ASH — SKU-3 'Ember' on Yupoong 6245CM 6-panel dad cap (washed black).
     Thumbnail / placement spec preview only. Not for production. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#1A1A1A"/>
  <text x="300" y="28" text-anchor="middle" fill="#7A7468" font-family="Impact, sans-serif" font-size="14" letter-spacing="4">SKU-3 · EMBER · CAP FRONT · YUPOONG 6245CM (WASHED PITCH)</text>

  <!-- cap silhouette -->
  <g transform="translate(120,80)">
    <!-- crown -->
    <path d="M 20 130 Q 30 30, 180 20 Q 330 30, 340 130 L 320 145 Q 180 130, 40 145 Z"
          fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1.5"/>
    <!-- brim -->
    <path d="M 10 145 Q 180 200, 350 145 L 350 175 Q 180 235, 10 175 Z"
          fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1.5"/>
    <!-- panel seam (front) -->
    <line x1="180" y1="20" x2="180" y2="140" stroke="#2A2A2A" stroke-width="0.5"/>
    <!-- button -->
    <circle cx="180" cy="22" r="3" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="0.5"/>

    <!-- embroidery placement: centered on front-panel, scaled to 2.25" -->
    <g transform="translate(180,90) scale(0.65)">
      <g fill="none" stroke="#E6E6E6" stroke-width="2.0" stroke-dasharray="7 4">
        <circle cx="0" cy="0" r="22" fill="none"/>
      </g>
      <g fill="#B8332A">
        <path d="M -29.4 -30.2 L -28.6 -31.0 L 30 28.2 L 29.4 28.8 Z"/>
        <circle cx="-29" cy="-29" r="1.6" fill="none" stroke="#B8332A" stroke-width="0.7"/>
      </g>
    </g>
    <!-- callout -->
    <line x1="220" y1="90" x2="340" y2="50" stroke="#7A7468" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="345" y="50" fill="#7A7468" font-family="Impact, sans-serif" font-size="11">~2.25" centered, water-soluble topping</text>
  </g>
  <text x="300" y="375" text-anchor="middle" fill="#7A7468" font-family="Impact, sans-serif" font-size="10">~550 stitches · 2 colors · suggested retail $32</text>
</svg>
