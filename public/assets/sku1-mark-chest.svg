<?xml version="1.0" encoding="UTF-8"?>
<!--
  STITCH AND ASH — SKU-1 "Mark" (chest hit, ~3.5"x3.5" sewout-target on heavyweight tee)
  Production-ready vector. Outlined paths only. No live text. No raster. No gradients.
  Single design unit: outline of broken running-stitch circle, ember-red diagonal needle, ash speckle dots.
  All thread colors keyed to Madeira Polyneon / Isacord (see brief).
  Coordinate system: 1 user-unit = 1mm. Total sewout footprint ~89mm x 89mm = ~3.5".
  Stitch-budget target: chest ~4,500 stitch cap. Estimate: ~4,200 stitches at 1.0mm-1.4mm satin density.
  Submit to digitizer with: target placement = left chest, stitch direction note in /digitizer-notes/.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" width="89mm" height="89mm" preserveAspectRatio="xMidYMid meet">
  <metadata>
    <design xmlns="urn:stitchandash:design">
      <sku>SAA-PILOT-01</sku>
      <name>Mark</name>
      <placement>left chest</placement>
      <unit>mm</unit>
      <target-stitches>4200</target-stitches>
      <max-stitches>4500</max-stitches>
      <colors>3</colors>
      <thread name="bone-white" hex="#E6E6E6" madeira="1001" isacord="0010"/>
      <thread name="ember-red" hex="#B8332A" madeira="1147" isacord="1903"/>
      <thread name="cold-ash" hex="#7A7468" madeira="1714" isacord="0151"/>
    </design>
  </metadata>

  <!-- Layer 1: broken-circle running stitch (bone-white). Outlined as a single closed compound path so the
       digitizer can lay it down as a running stitch following the centerline. The visual dash gaps
       are encoded as 12 separate arc segments so digitizing software does not collapse the gap. -->
  <g id="broken-circle" fill="none" stroke="#E6E6E6" stroke-width="1.6"
     stroke-linecap="butt" stroke-linejoin="miter">
    <!-- 12 arc segments of a circle r=36mm, each ~24deg with ~6deg gap, centered on (0,0) -->
    <path d="M 36.000 0.000 A 36 36 0 0 1 32.834 14.756"/>
    <path d="M 28.836 21.523 A 36 36 0 0 1 18.000 31.177"/>
    <path d="M 11.123 33.232 A 36 36 0 0 1 -1.884 35.951"/>
    <path d="M -9.380 34.756 A 36 36 0 0 1 -21.182 29.107"/>
    <path d="M -26.510 23.890 A 36 36 0 0 1 -32.834 14.756"/>
    <path d="M -35.014 7.500 A 36 36 0 0 1 -35.014 -7.500"/>
    <path d="M -32.834 -14.756 A 36 36 0 0 1 -26.510 -23.890"/>
    <path d="M -21.182 -29.107 A 36 36 0 0 1 -9.380 -34.756"/>
    <path d="M -1.884 -35.951 A 36 36 0 0 1 11.123 -33.232"/>
    <path d="M 18.000 -31.177 A 36 36 0 0 1 28.836 -21.523"/>
    <path d="M 32.834 -14.756 A 36 36 0 0 1 36.000 0.000"/>
  </g>

  <!-- Layer 2: ember-red diagonal needle (single satin-stitch line, tapered).
       Outlined as a closed quadrilateral so the digitizer reads this as a satin column,
       not a running stitch. Direction: top-left (eye) to bottom-right (point). -->
  <g id="needle" fill="#B8332A" stroke="none">
    <!-- Tapered satin column: 1.4mm wide at eye-end, 0.6mm wide at point-end -->
    <path d="M -46.20 -47.20 L -45.20 -48.20 L 47.20 44.80 L 46.40 45.60 Z"/>
  </g>

  <!-- Layer 3: needle eye — small open ring in ember-red. 1.5mm OD, 0.5mm wall. -->
  <g id="needle-eye" fill="none" stroke="#B8332A" stroke-width="0.9">
    <circle cx="-46.0" cy="-46.0" r="2.4"/>
  </g>

  <!-- Layer 4: thread tail trailing from eye (single running-stitch line). -->
  <g id="thread-tail" fill="none" stroke="#B8332A" stroke-width="0.7" stroke-linecap="round">
    <path d="M -48.40 -47.60 C -53.60 -46.40, -54.00 -42.40, -49.60 -39.20"/>
  </g>

  <!-- Layer 5: ash speckle — four single bartack stitches in cold-ash grey.
       Each ~1.4mm diameter filled disc. Reads as single bartack/tatami fill in digitizer. -->
  <g id="ash-speckle" fill="#7A7468" stroke="none">
    <circle cx="-12.0" cy="14.0" r="0.7"/>
    <circle cx="10.0" cy="-6.0" r="0.7"/>
    <circle cx="16.0" cy="18.0" r="0.7"/>
    <circle cx="-22.0" cy="-12.0" r="0.7"/>
    <circle cx="22.0" cy="-22.0" r="0.7"/>
    <circle cx="-6.0" cy="26.0" r="0.7"/>
  </g>
</svg>
