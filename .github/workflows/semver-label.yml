name: Semver Label

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Parse semver label from PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const body  = context.payload.pull_request.body || '';
            const pr    = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Determine label from conventional commit prefix
            let newLabel;
            if (/^(feat|fix|perf|refactor|revert|chore|docs|test|ci|build|style)(\(.+\))?!:/.test(title) ||
                /BREAKING CHANGE/.test(body)) {
              newLabel = 'semver:major';
            } else if (/^feat(\(.+\))?:/.test(title)) {
              newLabel = 'semver:minor';
            } else if (/^(fix|perf|refactor|revert|chore|docs|test|ci|build|style)(\(.+\))?:/.test(title)) {
              newLabel = 'semver:patch';
            } else {
              newLabel = 'semver:unknown';
            }

            // Fetch existing labels on the PR
            const { data: existingLabels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr,
            });
            const semverLabels = existingLabels
              .map(l => l.name)
              .filter(n => n.startsWith('semver:'));

            // Remove stale semver labels
            for (const stale of semverLabels) {
              if (stale !== newLabel) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr, name: stale,
                });
              }
            }

            // Ensure the target label exists in the repo
            const allLabels = await github.rest.issues.listLabelsForRepo({ owner, repo, per_page: 100 });
            const exists = allLabels.data.some(l => l.name === newLabel);
            if (!exists) {
              const colors = {
                'semver:major':   'e11d48',
                'semver:minor':   '0ea5e9',
                'semver:patch':   '22c55e',
                'semver:unknown': '94a3b8',
              };
              await github.rest.issues.createLabel({
                owner, repo,
                name: newLabel,
                color: colors[newLabel] || 'cccccc',
              });
            }

            // Apply the new label
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr, labels: [newLabel],
            });

            // Post a comment if label is unknown
            if (newLabel === 'semver:unknown') {
              const marker = '<!-- semver-label-bot -->';
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: pr,
              });
              const existing = comments.find(c => c.body.includes(marker));

              const table = [
                '| Prefix | Semver bump | Auto-merge? |',
                '|--------|-------------|-------------|',
                '| `feat!:` / `BREAKING CHANGE` in body | major | No — human review |',
                '| `feat:` | minor | Yes |',
                '| `fix:`, `perf:`, `refactor:`, `revert:` | patch | Yes |',
                '| `chore:`, `docs:`, `test:`, `ci:`, `build:`, `style:` | patch | Yes |',
              ].join('\n');
              const commentBody = [
                marker,
                '> Auto-merge blocked: missing conventional commit prefix.',
                '',
                'The PR title `' + title + '` does not start with a recognised conventional commit type.',
                'Rename it to one of:',
                '',
                table,
                '',
                'Once the title is updated, this label will be recalculated automatically.',
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr, body: commentBody,
                });
              }
            }

            core.info(`Applied label: ${newLabel}`);
