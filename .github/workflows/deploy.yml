name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, design/draft-artist, design/draft-swe, design/draft-development]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Typecheck
        run: nix develop -c pnpm typecheck

      - name: Build
        run: nix develop -c pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=stitch-and-ash-web --branch=${{ github.ref_name }}
