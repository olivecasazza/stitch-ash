name: Auto-merge

on:
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]
  status: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Skip the bootstrap PR entirely — it introduced this workflow and cannot dogfood it.
    if: ${{ !contains(github.event.pull_request.title, 'BOOTSTRAP') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate and enable auto-merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Resolve the PR number — available directly on pull_request events;
            // for check_suite/status events we need to look it up.
            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.eventName === 'status') {
              const sha = context.payload.sha;
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 50,
              });
              const match = prs.find(p => p.head.sha === sha);
              if (!match) { core.info('No open PR for this SHA — skipping.'); return; }
              prNumber = match.number;
            }

            if (!prNumber && context.eventName === 'check_suite') {
              const prs = context.payload.check_suite?.pull_requests || [];
              if (!prs.length) { core.info('No PRs attached to check suite — skipping.'); return; }
              prNumber = prs[0].number;
            }

            if (!prNumber) { core.info('Could not determine PR number — skipping.'); return; }

            // Fetch the PR
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });

            // Hard stop: bootstrap PR guard by title
            if (pr.title.includes('BOOTSTRAP')) {
              core.info('Bootstrap PR detected — skipping auto-merge.');
              return;
            }

            // Must not be a draft
            if (pr.draft) {
              core.info('PR is a draft — skipping auto-merge.');
              return;
            }

            // Must not have do-not-merge label
            const labels = pr.labels.map(l => l.name);
            if (labels.includes('do-not-merge')) {
              core.info('do-not-merge label present — skipping auto-merge.');
              return;
            }

            // Must have patch or minor semver label (not major or unknown)
            const autoMergeLabels = ['semver:patch', 'semver:minor'];
            const blockLabels     = ['semver:major', 'semver:unknown'];

            const hasAutoLabel  = labels.some(l => autoMergeLabels.includes(l));
            const hasBlockLabel = labels.some(l => blockLabels.includes(l));

            if (hasBlockLabel || !hasAutoLabel) {
              core.info(`Labels ${JSON.stringify(labels)} do not qualify for auto-merge.`);
              return;
            }

            // Enable GitHub native auto-merge (squash)
            // This is idempotent — calling it when already enabled is fine.
            try {
              await github.graphql(`
                mutation EnableAutoMerge($prId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) {
                    pullRequest { autoMergeRequest { enabledAt } }
                  }
                }
              `, { prId: pr.node_id });
              core.info(`Auto-merge (squash) enabled on PR #${prNumber}.`);
            } catch (err) {
              // If all checks aren't yet required-passing, enablePullRequestAutoMerge may
              // return an error. Log it but don't fail the workflow — a re-run will catch it.
              core.warning(`enablePullRequestAutoMerge: ${err.message}`);
            }
